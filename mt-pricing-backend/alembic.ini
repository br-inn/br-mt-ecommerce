# Alembic config — la URL real la inyecta `alembic/env.py` desde Settings.
# Autogenerate apunta a `app.db.models` (todos los modelos registrados via
# `app.db.models.__init__.py`). Ver ADR-049 (migration discipline).

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
timezone = UTC
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# La URL la setea env.py desde Settings.ALEMBIC_DATABASE_URL — no hardcoded.
sqlalchemy.url =

[post_write_hooks]
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = check --fix --select I REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
