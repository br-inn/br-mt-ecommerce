# =============================================================================
# Better Stack — declarative sources + dashboards (US-1A-OBS-01, ADR-077)
# =============================================================================
# Aplicado via `infra/terraform/observability.tf` con provider Better Stack.
# Tokens reales viven en Doppler (`BETTER_STACK_LOGS_TOKEN_BACKEND`, etc.).
# =============================================================================

team:
  name: "MT Pricing"
  region: eu  # GDPR: logs de UAE/EU sólo en EU region

# -----------------------------------------------------------------------------
# Sources — uno por servicio + ambiente; agrupados con tag `service`.
# -----------------------------------------------------------------------------
sources:
  - name: mt-backend-staging
    platform: docker
    retention_days: 14
    tags:
      service: mt-pricing-backend
      environment: staging
    schema:
      timestamp_field: dt
      level_field: level
      message_field: message
      structured_fields:
        - request_id
        - trace_id
        - tenant
        - actor_id
        - sku
        - channel
        - latency_ms

  - name: mt-backend-production
    platform: docker
    retention_days: 30
    tags:
      service: mt-pricing-backend
      environment: production
    schema:
      timestamp_field: dt
      level_field: level
      message_field: message
      structured_fields:
        - request_id
        - trace_id
        - tenant
        - actor_id
        - sku
        - channel
        - latency_ms

  - name: mt-worker-staging
    platform: docker
    retention_days: 14
    tags:
      service: mt-pricing-worker
      environment: staging
    schema:
      timestamp_field: dt
      level_field: level
      message_field: message
      structured_fields:
        - task_name
        - task_id
        - retry_count
        - queue
        - duration_seconds

  - name: mt-worker-production
    platform: docker
    retention_days: 30
    tags:
      service: mt-pricing-worker
      environment: production
    schema:
      timestamp_field: dt
      level_field: level
      message_field: message
      structured_fields:
        - task_name
        - task_id
        - retry_count
        - queue
        - duration_seconds

# -----------------------------------------------------------------------------
# Dashboards
# -----------------------------------------------------------------------------
dashboards:
  - slug: mt-pricing-overview
    name: "MT Pricing — Production overview"
    refresh_seconds: 30
    panels:
      - title: "Requests/sec"
        type: line
        query: 'service:"mt-pricing-backend" environment:"production" | rate(1m)'
      - title: "p95 latency"
        type: line
        query: 'service:"mt-pricing-backend" environment:"production" | percentile(latency_ms, 0.95) by (1m)'
      - title: "Error rate (last 5m)"
        type: gauge
        query: 'level:"ERROR" service:"mt-pricing-backend" environment:"production" | rate(5m) / total(5m)'
      - title: "Top 10 endpoints by p95"
        type: table
        query: 'service:"mt-pricing-backend" environment:"production" | top(endpoint, p95(latency_ms), 10)'

  - slug: mt-cost-tracker
    name: "MT Pricing — LLM cost tracker"
    refresh_seconds: 60
    panels:
      - title: "Cost Gemini today (USD)"
        type: counter
        query: 'event:"cost.gemini" environment:"production" | sum(cost_usd) over today'
      - title: "Cost OpenAI today (USD)"
        type: counter
        query: 'event:"cost.openai" environment:"production" | sum(cost_usd) over today'
      - title: "SP-API calls today"
        type: counter
        query: 'event:"sp_api.call" environment:"production" | count over today'

  - slug: mt-audit-stream
    name: "MT Pricing — Audit events stream"
    refresh_seconds: 30
    panels:
      - title: "Recent price approvals"
        type: stream
        query: 'event:"price.approved" environment:"production" | tail(50)'
      - title: "Recent cost upserts"
        type: stream
        query: 'event:"cost.upserted" environment:"production" | tail(50)'

# -----------------------------------------------------------------------------
# Alerts — escalation matrix
# -----------------------------------------------------------------------------
alerts:
  - slug: backend-error-spike
    severity: SEV1
    query: 'level:"ERROR" service:"mt-pricing-backend" environment:"production"'
    threshold:
      window_minutes: 5
      rate_pct: 0.5
    targets:
      slack: "#mt-alerts"
      pagerduty: mt-pricing-primary

  - slug: worker-stuck-tasks
    severity: SEV2
    query: 'event:"celery.task.timeout" environment:"production"'
    threshold:
      window_minutes: 15
      count: 3
    targets:
      slack: "#mt-alerts"

