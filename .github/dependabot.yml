# =============================================================================
# Dependabot configuration
# =============================================================================
# groups agrupa todas las updates de un ecosistema en 1 PR en vez de N.
# Major bumps ignorados — revisión manual por riesgo de breaking changes.
# Auto-merge de patch/minor via dependabot-auto-merge.yml.
# =============================================================================
---
version: 2
updates:
  # ---------------------------------------------------------------------------
  # Backend Python dependencies (managed by uv / pyproject.toml).
  # ---------------------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/mt-pricing-backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      python-patch:
        update-types: ["patch"]
      python-minor:
        update-types: ["minor"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------------------
  # Frontend npm/pnpm dependencies.
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/mt-pricing-frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      npm-patch:
        update-types: ["patch"]
      npm-minor:
        update-types: ["minor"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------------------
  # GitHub Actions — agrupa todas en 1 PR (incluye actions/* que necesitan
  # actualización a v6 para Node 20).
  # ---------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      github-actions-all:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------------------
  # Docker base images — 1 PR por Dockerfile.
  # ---------------------------------------------------------------------------
  - package-ecosystem: "docker"
    directory: "/mt-pricing-backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - backend
      - docker
    groups:
      docker-backend:
        patterns: ["*"]
    ignore:
      # python:3.11-slim → 3.14-slim es semver-minor (major=3 no cambia).
      # Actualización de Python base image es decisión manual, no automática.
      - dependency-name: "python"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/mt-pricing-frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - frontend
      - docker
    groups:
      docker-frontend:
        patterns: ["*"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
