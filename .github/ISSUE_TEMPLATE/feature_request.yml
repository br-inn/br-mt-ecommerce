name: Feature request
description: Propose a new capability or improvement.
title: "[feat]: "
labels: [enhancement, triage]
assignees: [psierra]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing! Frame the request as "user need + acceptance criteria",
        not as a solution. The team will discuss implementation alternatives.

  - type: textarea
    id: problem
    attributes:
      label: Problem / user need
      description: What pain or opportunity motivates this request? Include the affected persona.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution (optional)
      description: If you have one. Otherwise leave blank — we'll design it.
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Bullet list of testable conditions ("Given... When... Then...").
      placeholder: |
        - Given a logged-in admin
        - When they click "Export"
        - Then a CSV with columns A, B, C is generated within 5 seconds
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority (requestor's view)
      options:
        - P0 — must-have for next release
        - P1 — important, no firm deadline
        - P2 — nice-to-have
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds, related tools, or rejected approaches.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context / mockups
    validations:
      required: false

  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
        - label: I have considered impact on existing users / migrations.
          required: false
