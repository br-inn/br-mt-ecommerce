name: Bug report
description: Report a defect (production or development).
title: "[bug]: "
labels: [bug, triage]
assignees: [psierra]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. The more concrete the repro steps, the faster the fix.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered list. Include URLs, payloads, user roles.
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. Observe '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - SEV1 — production outage / data loss
        - SEV2 — major feature broken, no workaround
        - SEV3 — minor feature broken, workaround exists
        - SEV4 — cosmetic / minor
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - production
        - staging
        - development (local docker compose)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit SHA
      placeholder: e.g. main@a1b2c3d
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: Attach logs, stack traces, or screenshots. Redact secrets.
      render: shell

  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
        - label: I redacted secrets / PII from the report.
          required: true
