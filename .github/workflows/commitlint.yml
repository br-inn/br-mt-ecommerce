# =============================================================================
# Commitlint — workflow dedicado (alias del job en pr-checks.yml)
# =============================================================================
# pr-checks.yml ya valida commits en PRs. Este workflow es un check standalone
# que SOLO corre commitlint y se puede usar como required status check sin
# arrastrar todo el bundle de pr-checks.
#
# Triggers: pull_request open/sync/reopen + push a main.
# =============================================================================
---
name: commitlint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  push:
    branches: [main]

concurrency:
  group: commitlint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  lint-commits:
    name: Validate Conventional Commits
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install commitlint
        run: |
          npm install --no-save \
            @commitlint/cli@19 \
            @commitlint/config-conventional@19

      - name: Validate PR commits
        if: github.event_name == 'pull_request'
        run: |
          npx commitlint \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to   "${{ github.event.pull_request.head.sha }}" \
            --verbose

      - name: Validate last commit on main
        if: github.event_name == 'push'
        run: |
          npx commitlint --from "HEAD~1" --to "HEAD" --verbose
