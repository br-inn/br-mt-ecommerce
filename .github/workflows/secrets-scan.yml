# =============================================================================
# Secrets scanning — gitleaks
# =============================================================================
# Escanea el repo en busca de credenciales accidentalmente comiteadas.
# Triggers:
#   - push a main (full history scan)
#   - pull_request (solo el diff)
#   - schedule weekly (defensa en profundidad)
#
# Complementa el hook local `gitleaks` en .pre-commit-config.yaml.
# Doc oficial: https://github.com/gitleaks/gitleaks-action
#
# Secrets requeridos (opcionales):
#   - GITLEAKS_LICENSE  → solo si el repo se vuelve privado de organización con
#                         > 1 dev. Para repos personales/single-tenant no hace
#                         falta. Documentar en GitHub Settings → Secrets si se
#                         habilita.
# =============================================================================
---
name: secrets-scan

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    # Lunes 05:00 UTC — defensa en profundidad ante leaks históricos.
    - cron: "0 5 * * 1"
  workflow_dispatch: {}

concurrency:
  group: secrets-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Necesario para que gitleaks-action publique resumen en el PR.
  pull-requests: write
  # Para subir SARIF a code scanning.
  security-events: write

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          # Full clone necesario para escanear historia completa en push/schedule.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # ver header
          GITLEAKS_ENABLE_COMMENTS: "true"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"

  # ---------------------------------------------------------------------------
  # trufflehog — segundo escaneo (engines distintos, mejor cobertura).
  # No-blocking: corre en paralelo y solo reporta. Subir a blocking si los FPs
  # son aceptables tras 2 sprints de operación.
  # ---------------------------------------------------------------------------
  trufflehog:
    name: trufflehog (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run trufflehog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
