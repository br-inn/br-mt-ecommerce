# =============================================================================
# Secrets scanning — gitleaks CLI + trufflehog
# =============================================================================
# Escanea el repo en busca de credenciales accidentalmente comiteadas.
# Usa el binario gitleaks directamente (gratuito, sin licencia).
# Triggers:
#   - push a main (full history scan)
#   - pull_request (solo el diff)
#   - schedule weekly (defensa en profundidad)
# =============================================================================
---
name: secrets-scan

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    # Lunes 05:00 UTC — defensa en profundidad ante leaks históricos.
    - cron: "0 5 * * 1"
  workflow_dispatch: {}

concurrency:
  group: secrets-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.27.2/gitleaks_8.27.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run gitleaks
        run: gitleaks detect --source . --redact --config .gitleaks.toml

  # ---------------------------------------------------------------------------
  # trufflehog — segundo escaneo (engines distintos, mejor cobertura).
  # No-blocking: corre en paralelo y solo reporta. Subir a blocking si los FPs
  # son aceptables tras 2 sprints de operación.
  # ---------------------------------------------------------------------------
  trufflehog:
    name: trufflehog (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run trufflehog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.event.after }}
          extra_args: --only-verified
