# =============================================================================
# CI - Backend (FastAPI / Python 3.11 / uv)
# =============================================================================
# Runs on every PR and on pushes to main.
# Jobs lint/typecheck/test/security are SKIPPED automatically when no backend
# files changed — GitHub treats skipped jobs as passing for required checks.
# Docker image is only built+pushed on main (signed with cosign keyless).
# =============================================================================
---
name: ci-backend

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs on the same ref to avoid duplicate work.
concurrency:
  group: ci-backend-${{ github.ref }}
  cancel-in-progress: true

# Minimum required permissions; individual jobs request more if needed.
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  UV_VERSION: "0.11.16"
  WORKDIR: mt-pricing-backend

jobs:
  # ---------------------------------------------------------------------------
  # Detect whether backend files changed. Skip heavy jobs when they didn't.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect backend changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - "mt-pricing-backend/**"

  # ---------------------------------------------------------------------------
  # Lint + format check (ruff)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: false

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: uv sync --frozen

      - name: Ruff check (changed files only)
        run: |
          BASE=$(git merge-base origin/main HEAD)
          FILES=$(git diff --name-only --relative "$BASE" HEAD -- '*.py' | tr '\n' ' ')
          if [ -n "$FILES" ]; then
            uv run ruff check $FILES
          else
            echo "No Python files changed — skipping ruff check"
          fi

      - name: Ruff format --check (changed files only)
        run: |
          BASE=$(git merge-base origin/main HEAD)
          FILES=$(git diff --name-only --relative "$BASE" HEAD -- '*.py' | tr '\n' ' ')
          if [ -n "$FILES" ]; then
            uv run ruff format --check $FILES
          else
            echo "No Python files changed — skipping ruff format check"
          fi

  # ---------------------------------------------------------------------------
  # Static type checking (mypy)
  # ---------------------------------------------------------------------------
  typecheck:
    name: Typecheck (mypy)
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: false

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: uv sync --frozen

      - name: mypy (changed files only)
        run: |
          BASE=$(git merge-base origin/main HEAD)
          FILES=$(git diff --name-only --relative "$BASE" HEAD -- '*.py' | grep '^app/' | tr '\n' ' ')
          if [ -n "$FILES" ]; then
            uv run mypy $FILES
          else
            echo "No app/ Python files changed — skipping mypy"
          fi

  # ---------------------------------------------------------------------------
  # Unit + integration tests with PostgreSQL + Redis services.
  # Coverage gate: >= 70%.
  # ---------------------------------------------------------------------------
  test:
    name: Tests (pytest)
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    services:
      postgres:
        # pgvector/pgvector:pg16 incluye la extensión `vector` que requiere
        # la migración base (CREATE EXTENSION IF NOT EXISTS vector).
        # postgres:16-alpine no la tiene → migraciones fallaban.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: mt_pricing_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:testpassword@localhost:5432/mt_pricing_test
      ALEMBIC_DATABASE_URL: postgresql+psycopg://postgres:testpassword@localhost:5432/mt_pricing_test
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: test
      # Valores de prueba para los tests de autenticación (JWT signing/verify).
      # No son credenciales reales — el valor debe tener ≥32 caracteres.
      SUPABASE_JWT_SECRET: test-jwt-secret-deterministic-32chars!
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_ANON_KEY: anon-test-key
      SUPABASE_SERVICE_ROLE_KEY: service-role-test-key
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: false

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: uv sync --frozen

      - name: Create auth schema stub (Supabase shim for bare PG)
        run: |
          PGPASSWORD=testpassword psql -h localhost -U postgres -d mt_pricing_test \
            -c "CREATE SCHEMA IF NOT EXISTS auth; CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid LANGUAGE sql STABLE AS \$\$ SELECT NULL::uuid \$\$;"

      - name: Run pytest with coverage
        run: |
          uv run pytest \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: ${{ env.WORKDIR }}/coverage.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Dependency vulnerability scan (pip-audit).
  # ---------------------------------------------------------------------------
  security:
    name: Security (pip-audit)
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    continue-on-error: true  # advisory: starlette CVE requiere upgrade de major version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: false

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: uv sync --frozen

      - name: Run pip-audit
        run: uv run pip-audit --skip-editable

  # ---------------------------------------------------------------------------
  # Build + scan + sign Docker image. Only on push to main.
  # Uses cosign keyless signing (Sigstore OIDC) — no secrets needed.
  # ---------------------------------------------------------------------------
  build:
    name: Build & push image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write # required for cosign keyless
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/mt-pricing-backend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./mt-pricing-backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
