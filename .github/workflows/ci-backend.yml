# =============================================================================
# CI - Backend (FastAPI / Python 3.11 / uv)
# =============================================================================
# Runs on PRs touching backend code and on pushes to main.
# Stages: lint -> typecheck -> test (with services) -> security audit -> build.
# Docker image is only built+pushed on main (signed with cosign keyless).
# =============================================================================
---
name: ci-backend

on:
  push:
    branches: [main]
    paths:
      - "mt-pricing-backend/**"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    paths:
      - "mt-pricing-backend/**"
      - ".github/workflows/ci-backend.yml"

# Cancel in-progress runs on the same ref to avoid duplicate work.
concurrency:
  group: ci-backend-${{ github.ref }}
  cancel-in-progress: true

# Minimum required permissions; individual jobs request more if needed.
permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  UV_VERSION: "0.4.18"
  WORKDIR: mt-pricing-backend

jobs:
  # ---------------------------------------------------------------------------
  # Lint + format check (ruff)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format --check
        run: uv run ruff format --check .

  # ---------------------------------------------------------------------------
  # Static type checking (mypy)
  # ---------------------------------------------------------------------------
  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: uv sync --frozen

      - name: mypy
        run: uv run mypy app/

  # ---------------------------------------------------------------------------
  # Unit + integration tests with PostgreSQL + Redis services.
  # Coverage gate: >= 70%.
  # ---------------------------------------------------------------------------
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: mt_pricing_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:testpassword@localhost:5432/mt_pricing_test
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: uv sync --frozen

      - name: Run pytest with coverage
        run: |
          uv run pytest \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: ${{ env.WORKDIR }}/coverage.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Dependency vulnerability scan (pip-audit).
  # Non-blocking on PRs; fails the build only on main.
  # ---------------------------------------------------------------------------
  security:
    name: Security (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: uv sync --frozen

      - name: Run pip-audit
        run: uv run pip-audit --strict

  # ---------------------------------------------------------------------------
  # Build + scan + sign Docker image. Only on push to main.
  # Uses cosign keyless signing (Sigstore OIDC) — no secrets needed.
  # ---------------------------------------------------------------------------
  build:
    name: Build & push image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, typecheck, test, security]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write # required for cosign keyless
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/mt-pricing-backend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./mt-pricing-backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
