# =============================================================================
# Release Docker images (US-1A-CICD-01)
# =============================================================================
# Trigger: push de tag `v*`.
# Jobs: build-backend y build-frontend en paralelo.
# Cada job verifica si la imagen ya existe en GHCR antes de compilar:
#   - Si existe → salta build (útil en retry de runs fallidos).
# El deploy SSH lo maneja deploy-staging.yml (triggereado por este workflow).
# =============================================================================
---
name: release-images

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: release-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-backend:
    name: Build & push backend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/mt-pricing-backend
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker image prune -af || true

      - uses: actions/checkout@v4

      - name: Extract tag
        id: tag
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image already exists
        id: check
        run: |
          if docker manifest inspect $IMAGE:${{ steps.tag.outputs.tag }} >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "✓ $IMAGE:${{ steps.tag.outputs.tag }} already in GHCR — skipping build"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        if: steps.check.outputs.exists == 'false'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=tag
            type=sha,format=long
            type=raw,value=latest

      - name: Build & push
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: ./mt-pricing-backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build & push frontend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/mt-pricing-frontend
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker image prune -af || true

      - uses: actions/checkout@v4

      - name: Extract tag
        id: tag
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image already exists
        id: check
        run: |
          if docker manifest inspect $IMAGE:${{ steps.tag.outputs.tag }} >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "✓ $IMAGE:${{ steps.tag.outputs.tag }} already in GHCR — skipping build"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.check.outputs.exists == 'false'
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js 20
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        if: steps.check.outputs.exists == 'false'
        run: pnpm install --no-frozen-lockfile --filter mt-pricing-frontend...

      - name: Build Next.js app
        if: steps.check.outputs.exists == 'false'
        run: pnpm --filter mt-pricing-frontend build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NODE_OPTIONS: "--max-old-space-size=4096"
          NEXT_PUBLIC_BACKEND_URL: https://100-53-214-97.sslip.io
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        if: steps.check.outputs.exists == 'false'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=tag
            type=sha,format=long
            type=raw,value=latest

      - name: Build & push
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: ./mt-pricing-frontend
          file: ./mt-pricing-frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
