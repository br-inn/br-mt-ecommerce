# =============================================================================
# Release Docker images + deploy staging (US-1A-CICD-01)
# =============================================================================
# Trigger: push de tag `v*`.
# Jobs: build-backend → build-frontend → deploy (en paralelo los builds, deploy al final)
# =============================================================================
---
name: release-images

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: release-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-backend:
    name: Build & push backend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/mt-pricing-backend
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker image prune -af || true

      - uses: actions/checkout@v4

      - name: Extract tag
        id: tag
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=tag
            type=sha,format=long
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./mt-pricing-backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build & push frontend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/mt-pricing-frontend
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker image prune -af || true

      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --filter mt-pricing-frontend...

      - name: Build Next.js app
        run: pnpm --filter mt-pricing-frontend build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NODE_OPTIONS: "--max-old-space-size=4096"
          NEXT_PUBLIC_BACKEND_URL: https://54-234-73-1.sslip.io
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=tag
            type=sha,format=long
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./mt-pricing-frontend
          file: ./mt-pricing-frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to staging
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.STAGING_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Create deploy directory
        run: |
          ssh "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" \
            "mkdir -p ~/mt-deploy"

      - name: Copy compose + Caddyfile
        run: |
          scp docker-compose.staging.yml Caddyfile.staging \
            "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}:~/mt-deploy/"

      - name: Write .env.staging
        env:
          ENV_STAGING: ${{ secrets.ENV_STAGING }}
        run: |
          printf '%s' "$ENV_STAGING" | \
            ssh "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" \
              "cat > ~/mt-deploy/.env.staging"

      - name: Login to GHCR + pull + up
        run: |
          IMAGE_TAG="${GITHUB_REF_NAME}"
          ssh "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" "
            echo '${{ secrets.STAGING_GHCR_TOKEN }}' | docker login ghcr.io -u '${{ secrets.STAGING_GHCR_USER }}' --password-stdin \
            && cd ~/mt-deploy \
            && IMAGE_TAG=${IMAGE_TAG} STAGING_DOMAIN='${{ secrets.STAGING_DOMAIN }}' \
               docker compose -f docker-compose.staging.yml pull \
            && IMAGE_TAG=${IMAGE_TAG} STAGING_DOMAIN='${{ secrets.STAGING_DOMAIN }}' \
               docker compose -f docker-compose.staging.yml up -d --remove-orphans
          "

      - name: Healthcheck
        run: |
          HOST="${{ secrets.STAGING_DOMAIN }}"
          echo "Waiting for https://$HOST/health/live ..."
          for i in $(seq 1 18); do
            if curl -sfk "https://$HOST/health/live" >/dev/null 2>&1; then
              echo "OK after $((i*5))s"; exit 0
            fi
            echo "  attempt $i/18..."; sleep 5
          done
          echo "FAILED after 90s"; exit 1
