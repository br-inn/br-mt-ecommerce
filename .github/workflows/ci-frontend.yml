# =============================================================================
# CI - Frontend (Next.js / Node 20 / pnpm)
# =============================================================================
# Runs on every PR.
# Jobs lint/typecheck/test/build are SKIPPED automatically when no frontend
# files changed — GitHub treats skipped jobs as passing for required checks.
# =============================================================================
---
name: ci-frontend

on:
  pull_request:

concurrency:
  group: ci-frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.12.0"
  WORKDIR: mt-pricing-frontend

jobs:
  # ---------------------------------------------------------------------------
  # Detect whether frontend files changed. Skip heavy jobs when they didn't.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect frontend changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - "mt-pricing-frontend/**"
              - ".github/workflows/ci-frontend.yml"

  # ---------------------------------------------------------------------------
  # Lint (eslint via pnpm script)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ${{ env.WORKDIR }}/pnpm-lock.yaml

      - name: Install deps
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            echo "::warning::pnpm-lock.yaml no encontrado — install sin --frozen-lockfile"
            pnpm install --no-frozen-lockfile
          fi

      - name: Lint
        run: pnpm lint

  # ---------------------------------------------------------------------------
  # Typecheck (tsc --noEmit)
  # ---------------------------------------------------------------------------
  typecheck:
    name: Typecheck
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ${{ env.WORKDIR }}/pnpm-lock.yaml

      - name: Install deps
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            echo "::warning::pnpm-lock.yaml no encontrado — install sin --frozen-lockfile"
            pnpm install --no-frozen-lockfile
          fi

      - name: Typecheck
        run: pnpm typecheck

  # ---------------------------------------------------------------------------
  # Unit tests (vitest / jest configured in package.json)
  # ---------------------------------------------------------------------------
  test:
    name: Tests
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ${{ env.WORKDIR }}/pnpm-lock.yaml

      - name: Install deps
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            echo "::warning::pnpm-lock.yaml no encontrado — install sin --frozen-lockfile"
            pnpm install --no-frozen-lockfile
          fi

      - name: Test
        run: pnpm test -- --reporter=default --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: ${{ env.WORKDIR }}/coverage
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Production build + bundle size analysis.
  # ---------------------------------------------------------------------------
  build:
    name: Build
    needs: [changes, lint, typecheck, test]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ${{ env.WORKDIR }}/pnpm-lock.yaml

      - name: Install deps
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            echo "::warning::pnpm-lock.yaml no encontrado — install sin --frozen-lockfile"
            pnpm install --no-frozen-lockfile
          fi

      - name: Build (Next.js)
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Bundle size check
        run: |
          echo "TODO: integrate size-limit / next-bundle-analyzer"
          du -sh .next/static || true

      - name: Upload Next.js build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            ${{ env.WORKDIR }}/.next
            !${{ env.WORKDIR }}/.next/cache
          retention-days: 3
