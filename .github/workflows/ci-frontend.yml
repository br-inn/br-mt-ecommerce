# =============================================================================
# CI - Frontend (Next.js / Node 20 / pnpm)
# =============================================================================
# Runs on every PR.
# Jobs lint/typecheck/test/build are SKIPPED automatically when no frontend
# files changed -- GitHub treats skipped jobs as passing for required checks.
# Lint, typecheck, and tests run only on PR-changed files to avoid blocking
# backend PRs with pre-existing frontend errors.
# =============================================================================
---
name: ci-frontend

on:
  pull_request:

concurrency:
  group: ci-frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  WORKDIR: mt-pricing-frontend

jobs:
  # ---------------------------------------------------------------------------
  # Detect whether frontend files changed. Skip heavy jobs when they did not.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect frontend changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - "mt-pricing-frontend/**"

  # ---------------------------------------------------------------------------
  # Lint (eslint) -- only changed TS/TSX files to avoid pre-existing errors
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install deps
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      - name: Lint (changed files only)
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }} HEAD \
            | grep '^mt-pricing-frontend/' \
            | grep -E '\.(ts|tsx)$' \
            | sed 's|^mt-pricing-frontend/||' \
            || true)
          if [ -z "$CHANGED" ]; then
            echo "No changed TS/TSX files -- eslint skipped"
            exit 0
          fi
          echo "Linting changed files:"
          echo "$CHANGED"
          echo "$CHANGED" | tr '\n' '\0' | xargs -0 pnpm exec eslint

  # ---------------------------------------------------------------------------
  # Typecheck -- only changed TS/TSX files via dynamic tsconfig.ci.json
  # "include": [] overrides the parent tsconfig include so only files in
  # "files" are compiled; unrelated pre-existing errors are not reported.
  # ---------------------------------------------------------------------------
  typecheck:
    name: Typecheck
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install deps
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      - name: Typecheck (changed files only)
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }} HEAD \
            | grep '^mt-pricing-frontend/' \
            | grep -E '\.(ts|tsx)$' \
            | sed 's|^mt-pricing-frontend/||' \
            || true)
          if [ -z "$CHANGED" ]; then
            echo "No changed TS/TSX files -- typecheck skipped"
            exit 0
          fi
          echo "Type-checking changed files:"
          echo "$CHANGED"
          FILES_JSON=$(echo "$CHANGED" | python3 -c \
            "import sys,json; print(json.dumps(sys.stdin.read().strip().split('\n')))")
          printf '{"extends":"./tsconfig.json","include":[],"files":%s}\n' \
            "$FILES_JSON" > tsconfig.ci.json
          pnpm exec tsc --noEmit -p tsconfig.ci.json
          rm -f tsconfig.ci.json

  # ---------------------------------------------------------------------------
  # Unit tests -- only changed test files to avoid pre-existing failures
  # ---------------------------------------------------------------------------
  test:
    name: Tests
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install deps
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      - name: Test (changed test files only)
        run: |
          CHANGED_TESTS=$(git diff --name-only origin/${{ github.base_ref }} HEAD \
            | grep '^mt-pricing-frontend/' \
            | grep -E '\.test\.(ts|tsx)$' \
            | sed 's|^mt-pricing-frontend/||' \
            || true)
          if [ -z "$CHANGED_TESTS" ]; then
            echo "No changed test files -- vitest skipped"
            exit 0
          fi
          echo "Running tests for changed files:"
          echo "$CHANGED_TESTS"
          echo "$CHANGED_TESTS" | tr '\n' '\0' | \
            xargs -0 pnpm exec vitest run --reporter=default

  # ---------------------------------------------------------------------------
  # Production build + bundle size analysis.
  # ---------------------------------------------------------------------------
  build:
    name: Build
    needs: [changes, lint, typecheck, test]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ${{ env.WORKDIR }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install deps
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      - name: Build (Next.js)
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Bundle size check
        run: |
          echo "TODO: integrate size-limit / next-bundle-analyzer"
          du -sh .next/static || true

      - name: Upload Next.js build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            ${{ env.WORKDIR }}/.next
            !${{ env.WORKDIR }}/.next/cache
          retention-days: 3