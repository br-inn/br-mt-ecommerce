# =============================================================================
# PR Checks — umbrella workflow for pull request hygiene
# =============================================================================
# Runs on every PR:
#   - Conventional commits validation (commitlint)
#   - PR title check (semantic-pull-request)
#   - PR template completeness (must mention "Test plan")
#   - Path-based label assignment
# =============================================================================
---
name: pr-checks

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Validate commit messages on the PR using commitlint conventional config.
  # ---------------------------------------------------------------------------
  commitlint:
    name: Conventional commits
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install commitlint
        run: |
          npm install --no-save \
            @commitlint/cli@19 \
            @commitlint/config-conventional@19

      - name: Validate commits in PR
        run: |
          npx commitlint \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to   "${{ github.event.pull_request.head.sha }}" \
            --verbose

  # ---------------------------------------------------------------------------
  # Validate the PR title follows conventional-commits style (e.g. "feat: ...").
  # ---------------------------------------------------------------------------
  pr-title:
    name: Semantic PR title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert

  # ---------------------------------------------------------------------------
  # Ensure PR body uses the template (looks for required sections).
  # ---------------------------------------------------------------------------
  pr-template:
    name: PR template completeness
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check PR body sections
        env:
          BODY: ${{ github.event.pull_request.body }}
        run: |
          set -e
          missing=()
          for section in "## Summary" "## Test plan"; do
            if ! grep -qF "$section" <<< "$BODY"; then
              missing+=("$section")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "PR body is missing required sections:"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi
          echo "PR body OK"

  # ---------------------------------------------------------------------------
  # Auto-assign labels based on which paths were changed.
  # Configuration is inline (no separate .github/labeler.yml needed).
  # ---------------------------------------------------------------------------
  labeler:
    name: Path-based labels
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true
