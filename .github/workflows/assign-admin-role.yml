---
name: assign-admin-role

on:
  workflow_dispatch:
    inputs:
      email:
        description: "Email del usuario a promover a admin"
        required: true
        default: "psierra@br-innovation.com"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  assign-role:
    name: Assign admin role on staging
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.STAGING_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Assign admin role
        env:
          TARGET_EMAIL: ${{ github.event.inputs.email }}
        run: |
          ssh "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" \
            "docker exec mt-backend python -c \"
import asyncio, os, sys
from sqlalchemy import text
from sqlalchemy.ext.asyncio import create_async_engine

DATABASE_URL = os.environ['DATABASE_URL']
email = '$TARGET_EMAIL'

async def main():
    engine = create_async_engine(DATABASE_URL)
    async with engine.begin() as conn:
        result = await conn.execute(text(
            \\\"UPDATE public.users SET role_id = (
                SELECT id FROM public.roles WHERE code = 'admin'
            ) WHERE id = (
                SELECT id FROM public.users WHERE email = :email
            ) RETURNING email, role_id\\\"
        ), {'email': email})
        row = result.fetchone()
        if row:
            print(f'OK: {row[0]} → role_id={row[1]}')
            print(f'Run: SELECT email, r.code FROM public.users u JOIN public.roles r ON r.id = u.role_id WHERE u.email = \\\"{email}\\\";')
        else:
            print(f'ERROR: usuario no encontrado: {email}', file=sys.stderr)
            sys.exit(1)

asyncio.run(main())
\""
