# =============================================================================
# Deploy staging — SSH a AWS EC2 + docker compose pull/up (US-1A-CICD-01)
# =============================================================================
# Servidor: AWS EC2 Ubuntu. Secrets requeridos:
#   STAGING_SSH_KEY      — clave privada Ed25519 del key pair EC2
#   STAGING_SSH_HOST     — IP pública del servidor EC2
#   STAGING_SSH_USER     — usuario EC2 (típicamente `ubuntu`)
#   STAGING_DOMAIN       — dominio para healthcheck (e.g. 100-53-214-97.sslip.io)
#   ENV_STAGING          — contenido completo del .env.staging
# =============================================================================
---
name: deploy-staging

on:
  workflow_run:
    workflows: ["release-images"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag a deployar (e.g. v0.3.4-uat). Default: latest"
        required: false
        default: "latest"

permissions:
  contents: read
  packages: read

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy + healthcheck
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Resolver tag a deployar
      # -----------------------------------------------------------------------
      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "TAG=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "TAG=latest" >> "$GITHUB_OUTPUT"
          fi

      # -----------------------------------------------------------------------
      # SSH
      # -----------------------------------------------------------------------
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.STAGING_SSH_HOST }}" >> ~/.ssh/known_hosts

      # -----------------------------------------------------------------------
      # Preparar directorio en el servidor
      # -----------------------------------------------------------------------
      - name: Create deploy directory on server
        run: |
          ssh "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" \
            "mkdir -p /home/${{ secrets.STAGING_SSH_USER }}/mt-deploy"

      # -----------------------------------------------------------------------
      # Copiar archivos de configuración al servidor
      # -----------------------------------------------------------------------
      - name: Copy compose + Caddyfile to server
        run: |
          scp docker-compose.staging.yml Caddyfile.staging \
            "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}:/home/${{ secrets.STAGING_SSH_USER }}/mt-deploy/"

      - name: Write .env.staging to server
        run: |
          ssh "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" \
            "cat > /home/${{ secrets.STAGING_SSH_USER }}/mt-deploy/.env.staging << 'ENVEOF'
${{ secrets.ENV_STAGING }}
ENVEOF"

      # -----------------------------------------------------------------------
      # Login a GHCR en el servidor + pull + up
      # -----------------------------------------------------------------------
      - name: Pull images + deploy
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAG: ${{ steps.tag.outputs.TAG }}
          STAGING_DOMAIN: ${{ secrets.STAGING_DOMAIN }}
        run: |
          ssh "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" \
            "echo '${{ secrets.GITHUB_TOKEN }}' | \
               docker login ghcr.io --username '${{ github.actor }}' --password-stdin && \
             cd /home/${{ secrets.STAGING_SSH_USER }}/mt-deploy && \
             export IMAGE_TAG='${{ steps.tag.outputs.TAG }}' && \
             export STAGING_DOMAIN='${{ secrets.STAGING_DOMAIN }}' && \
             docker rm -f mt-dozzle-staging mt-caddy-staging 2>/dev/null || true && \
             docker compose -f docker-compose.staging.yml pull && \
             docker compose -f docker-compose.staging.yml up -d --remove-orphans"

      # -----------------------------------------------------------------------
      # Healthcheck (90s timeout)
      # -----------------------------------------------------------------------
      - name: Healthcheck
        run: |
          HOST="${{ secrets.STAGING_DOMAIN }}"
          echo "Waiting for https://$HOST/health/live ..."
          for i in $(seq 1 18); do
            if curl -sfk "https://$HOST/health/live" >/dev/null 2>&1; then
              echo "OK after $((i*5))s"
              exit 0
            fi
            echo "  attempt $i/18..."
            sleep 5
          done
          echo "FAILED after 90s"
          exit 1
