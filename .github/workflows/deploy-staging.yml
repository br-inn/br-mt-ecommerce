# =============================================================================
# Deploy staging — SSH a AWS EC2 + docker compose pull/up (US-1A-CICD-01)
# =============================================================================
# Servidor: AWS EC2 Ubuntu. Secrets requeridos:
#   STAGING_SSH_KEY      — clave privada Ed25519 del key pair EC2
#   STAGING_SSH_HOST     — IP pública del servidor EC2
#   STAGING_SSH_USER     — usuario EC2 (típicamente `ubuntu`)
#   STAGING_DOMAIN       — dominio para healthcheck (e.g. 100-53-214-97.sslip.io)
#   ENV_STAGING          — contenido completo del .env.staging
# =============================================================================
---
name: deploy-staging

on:
  workflow_run:
    workflows: ["release-images"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag a deployar (e.g. v0.5.9-uat). Default: latest"
        required: false
        default: "latest"

permissions:
  contents: read
  packages: read

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy + healthcheck
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Resolver tag a deployar
      # -----------------------------------------------------------------------
      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "TAG=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "TAG=latest" >> "$GITHUB_OUTPUT"
          fi

      # -----------------------------------------------------------------------
      # SSH
      # -----------------------------------------------------------------------
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.STAGING_SSH_HOST }}" >> ~/.ssh/known_hosts

      # -----------------------------------------------------------------------
      # Copiar archivos de configuración al servidor
      # -----------------------------------------------------------------------
      - name: Copy compose + Caddyfile to server
        run: |
          ssh "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" "mkdir -p ~/mt-deploy"
          scp docker-compose.staging.yml Caddyfile.staging \
            "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}:~/mt-deploy/"

      - name: Write .env.staging to server
        env:
          ENV_STAGING: ${{ secrets.ENV_STAGING }}
        run: |
          printf '%s' "$ENV_STAGING" | \
            ssh "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" \
              "cat > ~/mt-deploy/.env.staging"

      # -----------------------------------------------------------------------
      # Limpiar imágenes viejas ANTES del pull para evitar disco lleno
      # -----------------------------------------------------------------------
      - name: Prune old images before pull
        run: |
          ssh "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" \
            "docker image prune -af"

      # -----------------------------------------------------------------------
      # Login a GHCR en el servidor + pull + up
      # -----------------------------------------------------------------------
      - name: Pull images + deploy
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
          IMAGE_TAG: ${{ steps.tag.outputs.TAG }}
          STAGING_DOMAIN: ${{ secrets.STAGING_DOMAIN }}
        run: |
          ssh "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" \
            "echo '${GHCR_TOKEN}' | docker login ghcr.io -u '${GHCR_ACTOR}' --password-stdin \
             && cd ~/mt-deploy \
             && IMAGE_TAG=${IMAGE_TAG} STAGING_DOMAIN=${STAGING_DOMAIN} \
                docker compose -f docker-compose.staging.yml pull \
             && IMAGE_TAG=${IMAGE_TAG} STAGING_DOMAIN=${STAGING_DOMAIN} \
                docker compose -f docker-compose.staging.yml up -d --remove-orphans"

      # -----------------------------------------------------------------------
      # Healthcheck — espera hasta 120s a que Caddy responda con HTTPS
      # -----------------------------------------------------------------------
      - name: Healthcheck
        run: |
          HOST="${{ secrets.STAGING_DOMAIN }}"
          echo "Waiting for https://$HOST/health/live ..."
          for i in $(seq 1 24); do
            if curl -sfk "https://$HOST/health/live" >/dev/null 2>&1; then
              echo "OK after $((i*5))s"
              exit 0
            fi
            echo "  attempt $i/24..."
            sleep 5
          done
          echo "FAILED after 120s"
          exit 1
