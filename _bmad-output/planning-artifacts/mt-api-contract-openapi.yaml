---
title: "MT Middle East MDM + Pricing API — OpenAPI 3.1 Contract"
status: "draft"
version: "1.0"
created: "2026-05-06"
project_name: "mt-pricing-mdm-phase1"
related: ["prd-mt-pricing-mdm-phase1.md", "architecture-mt-pricing-mdm-phase1.md", "mt-users-module-design.md", "mt-jobs-module-design.md"]
---

# Notas (en español)
# Esta especificación OpenAPI 3.1 cubre Fase 1 (1a Datos Maestros + 1b Pricing).
# Convención: snake_case en JSON (alineado con columnas SQLAlchemy / DDL Postgres).
# Identificadores de entidad: SKU = TEXT (PK natural products); UUID = surrogate keys.
# Errores: RFC 7807 (application/problem+json) en todas las respuestas 4xx/5xx.
# Paginación: cursor-based (next_cursor) excepto endpoints admin pequeños (page/size).

openapi: 3.1.0

info:
  title: MT Middle East MDM + Pricing API
  version: 0.1.0
  summary: API REST para datos maestros (PIM), costes, pricing, importaciones, jobs y comparador competitivo de MT Middle East.
  description: |
    API backend FastAPI + SQLAlchemy 2.0 async + Supabase (Auth/Storage/Postgres).
    Cubre Fase 1: catálogo de productos, suppliers, costos por SKU×esquema, pricing
    con workflow de aprobación, canales (Amazon UAE / Noon / B2C / B2B), FX as-of,
    importadores con preview/apply, scheduler de jobs (Celery + DatabaseScheduler),
    audit trail particionado, RBAC por rol, KB hooks (Fase 1.5+ flag) y comparador
    de productos (research workstream).
  contact:
    name: BR Innovation — MT Platform Team
    email: psierra@br-innovation.com
    url: https://br-innovation.com
  license:
    name: Proprietary
    url: https://br-innovation.com/license
  x-related-adrs:
    - ADR-031 Supabase + uuidv7 + RLS
    - ADR-045 Persistencia híbrida SQLAlchemy + supabase-py
    - ADR-046 DatabaseScheduler para Celery beat editable

servers:
  - url: https://api.dev.mtme.ae/v1
    description: Development (Hetzner staging)
  - url: https://api.staging.mtme.ae/v1
    description: Staging
  - url: https://api.mtme.ae/v1
    description: Production

security:
  - BearerAuth: []

tags:
  - name: Auth
    description: Login / logout / magic link (delegan en Supabase Auth, expuestos para SDK).
  - name: Users
    description: Gestión de usuarios y perfil.
  - name: RolesPermissions
    description: Roles y catálogo de permisos.
  - name: Products
    description: Catálogo PIM.
  - name: ProductTranslations
    description: Traducciones ES/AR.
  - name: ProductImages
    description: Imágenes de producto en Supabase Storage.
  - name: Suppliers
    description: Proveedores y términos de contrato.
  - name: Costs
    description: Costos por SKU × esquema con FX as-of.
  - name: Prices
    description: Precios y workflow de aprobación.
  - name: Channels
    description: Canales de venta (Amazon UAE, Noon, B2C, B2B) y máquina de estados.
  - name: Schemes
    description: Esquemas de venta (FBA, FBM, DIRECT_B2C, DIRECT_B2B, MARKETPLACE).
  - name: Currencies
    description: Catálogo ISO 4217 + FX rates.
  - name: ExceptionRules
    description: Reglas de excepción (margin tolerance, FX swing, min margin floor, ...).
  - name: Approvals
    description: Cola y digest del Gerente Comercial.
  - name: Imports
    description: Importadores PIM / costos / fichas / traducciones (preview + apply).
  - name: MaterialCompatibility
    description: Tabla de compatibilidades de materiales × fluidos × T °C.
  - name: Jobs
    description: Job definitions (DatabaseScheduler) y job runs.
  - name: Audit
    description: Audit events (particionado mensual).
  - name: Knowledge
    description: KB hooks Fase 1 (sources + chunks). Búsqueda activa Fase 1.5+.
  - name: Comparator
    description: Comparador competitivo (research workstream).
  - name: Health
    description: Healthchecks live / ready / deep.

paths:

  # ────────────────────────────────────────────────────────────
  # AUTH
  # ────────────────────────────────────────────────────────────
  /auth/login:
    post:
      tags: [Auth]
      summary: Login con email + password (delega en Supabase Auth)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
            examples:
              default:
                value: { email: "psierra@br-innovation.com", password: "S3cur3-P4ss!" }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthSession' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout (revoca refresh token)
      responses:
        '204': { description: No Content }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/magic-link:
    post:
      tags: [Auth]
      summary: Solicitar magic link (Supabase Auth OTP por email)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
                redirect_to: { type: string, format: uri }
            examples:
              default:
                value: { email: "user@mt.com", redirect_to: "https://mtme.ae/auth/callback" }
      responses:
        '202': { description: Accepted — magic link enviado }
        '400': { $ref: '#/components/responses/BadRequest' }

  # ────────────────────────────────────────────────────────────
  # USERS
  # ────────────────────────────────────────────────────────────
  /me:
    get:
      tags: [Users]
      summary: Perfil del usuario autenticado + rol + permisos resueltos
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserDetail' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    patch:
      tags: [Users]
      summary: Actualizar preferencias propias (locale, full_name, avatar)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MeUpdate' }
            examples:
              change-locale:
                value: { locale: "en", full_name: "Pablo Sierra" }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserDetail' }

  /users:
    get:
      tags: [Users]
      summary: Listar usuarios (admin)
      parameters:
        - { in: query, name: role, schema: { type: string }, description: filtrar por código de rol }
        - { in: query, name: active, schema: { type: boolean } }
        - { in: query, name: q, schema: { type: string, maxLength: 100 }, description: búsqueda por nombre o email }
        - { in: query, name: cursor, schema: { type: string } }
        - { in: query, name: limit, schema: { type: integer, default: 50, maximum: 200 } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserPage' }
    post:
      tags: [Users]
      summary: Invitar usuario (admin/ti_integracion). Envía magic link.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserCreate' }
            examples:
              invite-comercial:
                value:
                  email: "comercial1@mt.com"
                  full_name: "Ana Comercial"
                  role_code: "comercial"
                  send_magic_link: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserDetail' }
        '409': { $ref: '#/components/responses/Conflict' }

  /users/{id}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Users]
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/UserDetail' } } }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Users]
      summary: Modificar usuario (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserPatch' }
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/UserDetail' } } }

  /users/{id}/roles:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Users]
      summary: Asignar rol a usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role_code]
              properties:
                role_code: { type: string, example: "gerente_comercial" }
      responses:
        '204': { description: Asignado }

  /users/{id}/roles/{role_code}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      - { in: path, name: role_code, required: true, schema: { type: string } }
    delete:
      tags: [Users]
      summary: Revocar rol de usuario
      responses:
        '204': { description: Revocado }

  /users/{id}/force-logout:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Users]
      summary: Forzar logout (revoca todas las sessions del usuario en Supabase)
      responses:
        '204': { description: Logout forzado }

  # ────────────────────────────────────────────────────────────
  # ROLES & PERMISSIONS
  # ────────────────────────────────────────────────────────────
  /roles:
    get:
      tags: [RolesPermissions]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Role' }

  /roles/{id}/permissions:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [RolesPermissions]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Permission' }

  /permissions:
    get:
      tags: [RolesPermissions]
      summary: Catálogo completo de permisos (code + description)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Permission' }

  # ────────────────────────────────────────────────────────────
  # PRODUCTS (PIM)
  # ────────────────────────────────────────────────────────────
  /products:
    get:
      tags: [Products]
      summary: Listar productos con filtros y cursor pagination
      parameters:
        - { in: query, name: family, schema: { type: string } }
        - { in: query, name: brand, schema: { type: string } }
        - { in: query, name: data_quality, schema: { $ref: '#/components/schemas/DataQuality' } }
        - { in: query, name: translation_status, schema: { type: string, enum: [pending, draft, approved] } }
        - { in: query, name: lang, schema: { type: string, enum: [es, ar] }, description: lengua para filtrar translation_status }
        - { in: query, name: active, schema: { type: boolean } }
        - { in: query, name: search, schema: { type: string }, description: búsqueda full-text en name_en + sku }
        - { in: query, name: cursor, schema: { type: string } }
        - { in: query, name: limit, schema: { type: integer, default: 50, maximum: 200 } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductPage' }
    post:
      tags: [Products]
      summary: Crear producto (PIM)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductCreate' }
            examples:
              minimal:
                value:
                  sku: "MT-V-038"
                  name_en: "Brass ball valve DN15 PN16"
                  family: "valves_ball"
                  brand: "Pegler"
                  material: "brass"
                  dn: "DN15"
                  pn: "PN16"
                  specs: { thread_standard: "BSP", body_material: "brass_cw617n" }
      responses:
        '201':
          description: Created
          content: { application/json: { schema: { $ref: '#/components/schemas/ProductDetail' } } }
        '409': { $ref: '#/components/responses/Conflict' }

  /products/search:
    get:
      tags: [Products]
      summary: Búsqueda rápida tipo Cmd-K (trigram name_en + sku prefix)
      parameters:
        - { in: query, name: q, required: true, schema: { type: string, minLength: 2 } }
        - { in: query, name: limit, schema: { type: integer, default: 10, maximum: 50 } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Product' }

  /products/{sku}:
    parameters:
      - { in: path, name: sku, required: true, schema: { type: string } }
    get:
      tags: [Products]
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/ProductDetail' } } }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Products]
      summary: Modificar producto (respeta manual_locked_fields)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductPatch' }
            examples:
              update-specs:
                value:
                  marketing_copy_en: "Premium DN15 brass ball valve, full-bore"
                  manual_locked_fields: ["marketing_copy_en"]
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/ProductDetail' } } }
    delete:
      tags: [Products]
      summary: Soft-delete (active=false)
      responses:
        '204': { description: Borrado lógico }

  /products/{sku}/translations:
    parameters:
      - { in: path, name: sku, required: true, schema: { type: string } }
    get:
      tags: [ProductTranslations]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ProductTranslation' }

  /products/{sku}/translations/{lang}:
    parameters:
      - { in: path, name: sku, required: true, schema: { type: string } }
      - { in: path, name: lang, required: true, schema: { type: string, enum: [es, ar] } }
    patch:
      tags: [ProductTranslations]
      summary: Crear o actualizar traducción
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductTranslationPatch' }
            examples:
              ar:
                value:
                  name: "صمام كروي نحاسي DN15"
                  description: "صمام كروي مصنوع من النحاس الأصفر"
                  status: "draft"
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/ProductTranslation' } } }

  /products/{sku}/images:
    parameters:
      - { in: path, name: sku, required: true, schema: { type: string } }
    post:
      tags: [ProductImages]
      summary: Subir imagen (multipart) o solicitar signed URL
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, role]
              properties:
                file: { type: string, format: binary }
                role: { type: string, example: "main" }
                alt_text: { type: string }
          application/json:
            schema:
              type: object
              required: [role, filename]
              properties:
                role: { type: string }
                filename: { type: string }
                content_type: { type: string }
            examples:
              signed-url:
                value: { role: "main", filename: "MT-V-038.jpg", content_type: "image/jpeg" }
      responses:
        '201':
          description: Imagen creada o signed URL devuelta
          content: { application/json: { schema: { $ref: '#/components/schemas/ProductImage' } } }

  # ────────────────────────────────────────────────────────────
  # SUPPLIERS
  # ────────────────────────────────────────────────────────────
  /suppliers:
    get:
      tags: [Suppliers]
      parameters:
        - { in: query, name: active, schema: { type: boolean } }
        - { in: query, name: cursor, schema: { type: string } }
        - { in: query, name: limit, schema: { type: integer, default: 50, maximum: 200 } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SupplierPage' }
    post:
      tags: [Suppliers]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SupplierCreate' }
            examples:
              pegler:
                value:
                  code: "PEGLER"
                  name: "Pegler Yorkshire"
                  contact_email: "sales@pegler.com"
                  contract_currency: "EUR"
                  lead_time_days: 21
                  payment_terms: "30 days net"
      responses:
        '201':
          description: Created
          content: { application/json: { schema: { $ref: '#/components/schemas/Supplier' } } }
        '409': { $ref: '#/components/responses/Conflict' }

  /suppliers/{code}:
    parameters:
      - { in: path, name: code, required: true, schema: { type: string } }
    get:
      tags: [Suppliers]
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/Supplier' } } }
    patch:
      tags: [Suppliers]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SupplierPatch' }
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/Supplier' } } }
    delete:
      tags: [Suppliers]
      responses:
        '204': { description: Soft-delete (active=false) }

  /suppliers/{code}/products:
    parameters:
      - { in: path, name: code, required: true, schema: { type: string } }
    get:
      tags: [Suppliers]
      summary: Productos suministrados (vía costs.supplier_code)
      parameters:
        - { in: query, name: cursor, schema: { type: string } }
        - { in: query, name: limit, schema: { type: integer, default: 50, maximum: 200 } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductPage' }

  # ────────────────────────────────────────────────────────────
  # COSTS
  # ────────────────────────────────────────────────────────────
  /products/{sku}/costs:
    parameters:
      - { in: path, name: sku, required: true, schema: { type: string } }
    get:
      tags: [Costs]
      parameters:
        - { in: query, name: scheme, schema: { $ref: '#/components/schemas/Scheme' } }
        - { in: query, name: as_of, schema: { type: string, format: date-time } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Cost' }
    post:
      tags: [Costs]
      summary: Registrar coste (FX as-of stamping automático)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CostCreate' }
            examples:
              fba-pegler:
                value:
                  scheme: "FBA"
                  supplier_code: "PEGLER"
                  fob: 12.40
                  freight: 1.80
                  customs: 2.10
                  fba_fees: 8.50
                  payment_fees: 0.62
                  marketing_fees: 0.00
                  currency: "EUR"
                  effective_from: "2026-05-06T00:00:00Z"
      responses:
        '201':
          description: Created
          content: { application/json: { schema: { $ref: '#/components/schemas/Cost' } } }

  /costs/{id}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
    patch:
      tags: [Costs]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CostPatch' }
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/Cost' } } }

  /costs/recalculate-batch:
    post:
      tags: [Costs]
      summary: Disparar recálculo masivo (FX o cambio coste). Devuelve job_run_id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                trigger: { type: string, enum: [fx_change, cost_change, manual] }
                from_currency: { type: string, minLength: 3, maxLength: 3 }
                to_currency: { type: string, minLength: 3, maxLength: 3 }
                supplier_code: { type: string }
                scheme: { $ref: '#/components/schemas/Scheme' }
                reason: { type: string }
            examples:
              fx-eur-aed:
                value: { trigger: "fx_change", from_currency: "EUR", to_currency: "AED", reason: "ECB rate update" }
      responses:
        '202':
          description: Accepted — job encolado
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_run_id: { type: string, format: uuid }
                  estimated_skus: { type: integer }

  # ────────────────────────────────────────────────────────────
  # PRICES
  # ────────────────────────────────────────────────────────────
  /products/{sku}/prices:
    parameters:
      - { in: path, name: sku, required: true, schema: { type: string } }
    get:
      tags: [Prices]
      parameters:
        - { in: query, name: channel_code, schema: { type: string } }
        - { in: query, name: scheme, schema: { $ref: '#/components/schemas/Scheme' } }
        - { in: query, name: status, schema: { $ref: '#/components/schemas/PriceState' } }
        - { in: query, name: as_of, schema: { type: string, format: date-time } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Price' }

  /products/{sku}/prices/propose:
    parameters:
      - { in: path, name: sku, required: true, schema: { type: string } }
    post:
      tags: [Prices]
      summary: Proponer precio (rol comercial). Evalúa rules → auto_approved | pending_review.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PriceProposal' }
            examples:
              amazon-uae-fba:
                value:
                  channel_code: "amazon_uae"
                  scheme: "FBA"
                  amount: 89.50
                  currency: "AED"
                  pvp_min: 75.00
                  rule_applied: "FBA_DEFAULT_MARGIN_22"
                  valid_from: "2026-05-10T00:00:00Z"
      responses:
        '201':
          description: Created
          content: { application/json: { schema: { $ref: '#/components/schemas/Price' } } }

  /prices/{id}/approve:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Prices]
      summary: Aprobar precio (rol gerente_comercial)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment: { type: string }
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/Price' } } }

  /prices/{id}/reject:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Prices]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string, minLength: 5 }
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/Price' } } }

  /prices/{id}/revise:
    parameters:
