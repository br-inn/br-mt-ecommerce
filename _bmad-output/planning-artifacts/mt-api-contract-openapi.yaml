# ──────────────────────────────────────────────────────────────
# COMPONENTS
# ──────────────────────────────────────────────────────────────
components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT firmado por Supabase Auth (HS256). `app_metadata.role` y `app_metadata.permissions` resueltos en JWT.
    BasicAuth:
      type: http
      scheme: basic
      description: Reservado para deep healthchecks (`/health/db`, `/health/redis`, ...).

  responses:
    BadRequest:
      description: Bad request
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Unauthorized:
      description: Unauthorized
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Forbidden:
      description: Forbidden (RBAC)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    NotFound:
      description: Not found
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Conflict:
      description: Conflict (UNIQUE / FK)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    UnprocessableEntity:
      description: Validation error
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ValidationError' }

  schemas:

    # ─── Common ────────────────────────────────────────────
    ProblemDetails:
      type: object
      description: RFC 7807
      properties:
        type: { type: string, format: uri, default: "about:blank" }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string, format: uri }
        request_id: { type: string }
        code: { type: string, description: "Internal error code (e.g. PRICE_VALIDATION_FAILED)" }
      required: [title, status]

    ValidationError:
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
        - type: object
          properties:
            errors:
              type: array
              items:
                type: object
                properties:
                  field: { type: string }
                  message: { type: string }
                  code: { type: string }

    Pagination:
      type: object
      description: Cursor-based pagination envelope
      properties:
        next_cursor: { type: string, nullable: true }
        prev_cursor: { type: string, nullable: true }
        limit: { type: integer }

    BulkFailure:
      type: object
      properties:
        id: { type: string }
        reason: { type: string }
        code: { type: string }

    # ─── Enums ─────────────────────────────────────────────
    DataQuality:
      type: string
      enum: [complete, partial, blocked, migrated_demo]

    TranslationStatus:
      type: string
      enum: [pending, draft, approved]

    ChannelState:
      type: string
      enum: [inactive, pre_launch, pilot, live, paused, deprecated]

    PriceState:
      type: string
      enum: [draft, pending_review, auto_approved, approved, rejected, revised, exported, superseded, migrated]

    CostStatus:
      type: string
      enum: [draft, approved, superseded, migrated]

    Scheme:
      type: string
      enum: [FBA, FBM, DIRECT_B2C, DIRECT_B2B, MARKETPLACE]

    FxSource:
      type: string
      enum: [manual, feed_xe, feed_oanda, feed_ecb, migrated_inferred]

    ImportType:
      type: string
      enum: [pim_real, costs_real, excel_demo, translations, fx, datasheets, material_compatibility]

    ImportStatus:
      type: string
      enum: [queued, parsing, validating, preview_ready, applying, completed, failed, cancelled]

    JobStatus:
      type: string
      enum: [idle, running, success, failure, cancelled]

    JobOwner:
      type: string
      enum: [infra, business]

    ScheduleType:
      type: string
      enum: [cron, interval]

    MatchStatus:
      type: string
      enum: [unmatched, candidate, confirmed, rejected]

    CompatT:
      type: string
      enum: [A, B, C, D, SIN_DATO]

    # ─── Auth ──────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }

    AuthSession:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, default: "bearer" }
        expires_in: { type: integer }
        user: { $ref: '#/components/schemas/UserDetail' }

    # ─── Users / Roles / Permissions ───────────────────────
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        full_name: { type: string, nullable: true }
        avatar_url: { type: string, format: uri, nullable: true }
        locale: { type: string, default: "es", description: "ISO 639-1" }
        is_active: { type: boolean }
        role_id: { type: string, format: uuid, nullable: true }
        last_login_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, email, is_active, locale, created_at, updated_at]

    UserDetail:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            role: { $ref: '#/components/schemas/Role' }
            permissions:
              type: array
              items: { type: string, description: "permission code, e.g. products:write" }

    UserCreate:
      type: object
      required: [email, full_name, role_code]
      properties:
        email: { type: string, format: email }
        full_name: { type: string, minLength: 2, maxLength: 200 }
        role_code: { type: string }
        locale: { type: string, default: "es" }
        send_magic_link: { type: boolean, default: true }

    UserPatch:
      type: object
      properties:
        full_name: { type: string }
        locale: { type: string }
        is_active: { type: boolean }
        role_code: { type: string, nullable: true }

    MeUpdate:
      type: object
      properties:
        full_name: { type: string }
        locale: { type: string }
        avatar_url: { type: string, format: uri }

    UserPage:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/UserDetail' } }
        next_cursor: { type: string, nullable: true }

    Role:
      type: object
      properties:
        id: { type: string, format: uuid }
        code: { type: string, example: "comercial" }
        name: { type: string }
        description: { type: string, nullable: true }
        is_system: { type: boolean }
      required: [id, code, name, is_system]

    Permission:
      type: object
      properties:
        id: { type: string, format: uuid }
        code: { type: string, example: "products:write" }
        description: { type: string, nullable: true }
      required: [id, code]

    # ─── Products ──────────────────────────────────────────
    Product:
      type: object
      properties:
        sku: { type: string, maxLength: 64 }
        internal_id: { type: string, format: uuid }
        name_en: { type: string }
        family: { type: string }
        subfamily: { type: string, nullable: true }
        type: { type: string, nullable: true, description: "valve type" }
        material: { type: string, nullable: true }
        dn: { type: string, nullable: true }
        pn: { type: string, nullable: true }
        connection: { type: string, nullable: true }
        brand: { type: string, nullable: true }
        data_quality: { $ref: '#/components/schemas/DataQuality' }
        active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [sku, internal_id, name_en, family, data_quality, active]

    ProductDetail:
      allOf:
        - $ref: '#/components/schemas/Product'
        - type: object
          properties:
            description_en: { type: string, nullable: true }
            marketing_copy_en: { type: string, nullable: true }
            specs: { $ref: '#/components/schemas/ProductSpecsPayload' }
            manual_locked_fields:
              type: array
              items: { type: string }
            translations:
              type: array
              items: { $ref: '#/components/schemas/ProductTranslation' }
            images:
              type: array
              items: { $ref: '#/components/schemas/ProductImage' }
            embedding_model: { type: string, nullable: true }
            embedding_at: { type: string, format: date-time, nullable: true }
            created_by: { type: string, format: uuid, nullable: true }
            updated_by: { type: string, format: uuid, nullable: true }

    ProductCreate:
      type: object
      required: [sku, name_en, family]
      properties:
        sku: { type: string, maxLength: 64 }
        name_en: { type: string, minLength: 2 }
        description_en: { type: string }
        marketing_copy_en: { type: string }
        family: { type: string }
        subfamily: { type: string }
        type: { type: string }
        material: { type: string }
        dn: { type: string }
        pn: { type: string }
        connection: { type: string }
        brand: { type: string }
        specs: { $ref: '#/components/schemas/ProductSpecsPayload' }
        data_quality: { $ref: '#/components/schemas/DataQuality' }

    ProductPatch:
      type: object
      properties:
        name_en: { type: string }
        description_en: { type: string }
        marketing_copy_en: { type: string }
        family: { type: string }
        subfamily: { type: string }
        type: { type: string }
        material: { type: string }
        dn: { type: string }
        pn: { type: string }
        connection: { type: string }
        brand: { type: string }
        specs: { $ref: '#/components/schemas/ProductSpecsPayload' }
        data_quality: { $ref: '#/components/schemas/DataQuality' }
        manual_locked_fields:
          type: array
          items: { type: string }
        active: { type: boolean }

    ProductPage:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Product' } }
        next_cursor: { type: string, nullable: true }
        total_count_estimate: { type: integer, nullable: true }

    ProductSpecsPayload:
      type: object
      additionalProperties: true
      description: |
        JSONB con specs estructuradas (mirror Pydantic en backend).
      properties:
        thread_standard: { type: string, enum: [BSP, NPT, ISO_228, ISO_7_1, NONE], nullable: true }
        body_material: { type: string, nullable: true }
        seat_material: { type: string, nullable: true }
        max_temperature_c: { type: integer, nullable: true }
        max_pressure_bar: { type: number, nullable: true }
        certification:
          type: array
          items: { type: string }
        weight_kg: { type: number, nullable: true }

    ProductTranslation:
      type: object
      properties:
        sku: { type: string }
        lang: { type: string, enum: [es, ar] }
        name: { type: string, nullable: true }
        description: { type: string, nullable: true }
        marketing_copy: { type: string, nullable: true }
        status: { $ref: '#/components/schemas/TranslationStatus' }
        translated_by: { type: string, format: uuid, nullable: true }
        translated_at: { type: string, format: date-time, nullable: true }
        reviewed_by: { type: string, format: uuid, nullable: true }
        reviewed_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [sku, lang, status]

    ProductTranslationPatch:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        marketing_copy: { type: string }
        status: { $ref: '#/components/schemas/TranslationStatus' }

    ProductImage:
      type: object
      properties:
        id: { type: string, format: uuid }
        sku: { type: string }
        role: { type: string, example: "main" }
        storage_path: { type: string }
        signed_url: { type: string, format: uri, nullable: true }
        upload_url: { type: string, format: uri, nullable: true, description: "presigned URL si flujo signed" }
        alt_text: { type: string, nullable: true }
        width: { type: integer, nullable: true }
        height: { type: integer, nullable: true }
        hash_sha256: { type: string, nullable: true }
        status: { type: string, enum: [active, archived, broken] }
        created_at: { type: string, format: date-time }
      required: [id, sku, role, storage_path, status]

    # ─── Suppliers ─────────────────────────────────────────
    Supplier:
      type: object
      properties:
        code: { type: string }
        name: { type: string }
        contact_email: { type: string, format: email, nullable: true }
        contact_phone: { type: string, nullable: true }
        contract_currency: { type: string, minLength: 3, maxLength: 3 }
        lead_time_days: { type: integer, nullable: true }
        payment_terms: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [code, name, contract_currency, active]

    SupplierCreate:
      type: object
      required: [code, name, contract_currency]
      properties:
        code: { type: string }
        name: { type: string }
        contact_email: { type: string, format: email }
        contact_phone: { type: string }
        contract_currency: { type: string, minLength: 3, maxLength: 3 }
        lead_time_days: { type: integer, minimum: 0 }
        payment_terms: { type: string }
        notes: { type: string }

    SupplierPatch:
      type: object
      properties:
        name: { type: string }
        contact_email: { type: string, format: email }
        contact_phone: { type: string }
        contract_currency: { type: string, minLength: 3, maxLength: 3 }
        lead_time_days: { type: integer }
        payment_terms: { type: string }
        notes: { type: string }
        active: { type: boolean }

    SupplierPage:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Supplier' } }
        next_cursor: { type: string, nullable: true }

    # ─── Costs ─────────────────────────────────────────────
    CostBreakdown:
      type: object
      description: Mirror tipado de la fila costs (subset breakdown)
      properties:
        fob: { type: number, format: double }
        freight: { type: number, format: double }
        customs: { type: number, format: double }
        fba_fees: { type: number, format: double }
        fbm_fees: { type: number, format: double }
        payment_fees: { type: number, format: double }
        marketing_fees: { type: number, format: double }
        other_fees: { type: object, additionalProperties: { type: number } }

    Cost:
      type: object
      properties:
        id: { type: string, format: uuid }
        sku: { type: string }
        scheme: { $ref: '#/components/schemas/Scheme' }
        supplier_code: { type: string }
        breakdown: { $ref: '#/components/schemas/CostBreakdown' }
        total: { type: number, format: double }
        currency: { type: string, minLength: 3, maxLength: 3 }
        fx_at: { type: string, format: date-time }
        fx_rate_to_base: { type: number, format: double }
        total_in_base: { type: number, format: double }
        effective_from: { type: string, format: date-time }
        effective_to: { type: string, format: date-time, nullable: true }
        status: { $ref: '#/components/schemas/CostStatus' }
        created_at: { type: string, format: date-time }
        created_by: { type: string, format: uuid, nullable: true }
        approved_at: { type: string, format: date-time, nullable: true }
        approved_by: { type: string, format: uuid, nullable: true }
      required: [id, sku, scheme, supplier_code, total, currency, fx_at, fx_rate_to_base, total_in_base, effective_from, status, created_at]

    CostCreate:
      type: object
      required: [scheme, supplier_code, currency, effective_from]
      properties:
        scheme: { $ref: '#/components/schemas/Scheme' }
        supplier_code: { type: string }
        fob: { type: number, default: 0 }
        freight: { type: number, default: 0 }
        customs: { type: number, default: 0 }
        fba_fees: { type: number, default: 0 }
        fbm_fees: { type: number, default: 0 }
        payment_fees: { type: number, default: 0 }
        marketing_fees: { type: number, default: 0 }
        other_fees: { type: object, additionalProperties: { type: number } }
        currency: { type: string, minLength: 3, maxLength: 3 }
        effective_from: { type: string, format: date-time }
        effective_to: { type: string, format: date-time, nullable: true }

    CostPatch:
      type: object
      properties:
        fob: { type: number }
        freight: { type: number }
        customs: { type: number }
        fba_fees: { type: number }
        fbm_fees: { type: number }
        payment_fees: { type: number }
        marketing_fees: { type: number }
        other_fees: { type: object, additionalProperties: { type: number } }
        effective_to: { type: string, format: date-time, nullable: true }
        status: { $ref: '#/components/schemas/CostStatus' }

    # ─── Prices ────────────────────────────────────────────
    PriceBreakdown:
      type: object
      properties:
        cost_in_base: { type: number, format: double }
        margin_abs: { type: number, format: double }
        margin_pct: { type: number, format: double }
        fees_breakdown: { type: object, additionalProperties: { type: number } }
        fx_rate_used: { type: number, format: double }

    AlertPayload:
      type: object
      properties:
        critical:
          type: array
          items: { type: object, properties: { code: { type: string }, message: { type: string } } }
        warnings:
          type: array
          items: { type: object, properties: { code: { type: string }, message: { type: string } } }

    Price:
      type: object
      properties:
        id: { type: string, format: uuid }
        sku: { type: string }
        channel_code: { type: string }
        scheme: { $ref: '#/components/schemas/Scheme' }
        amount: { type: number, format: double }
        currency: { type: string, minLength: 3, maxLength: 3 }
        pvp_min: { type: number, format: double, nullable: true }
        margin_pct: { type: number, format: double, nullable: true }
        rule_applied: { type: string, nullable: true }
        breakdown: { $ref: '#/components/schemas/PriceBreakdown' }
        alerts: { $ref: '#/components/schemas/AlertPayload' }
        fx_at: { type: string, format: date-time }
        fx_rate_to_base: { type: number, format: double }
        amount_in_base: { type: number, format: double }
        status: { $ref: '#/components/schemas/PriceState' }
        auto_approve_reason: { type: object, additionalProperties: true, nullable: true }
        rejection_reason: { type: string, nullable: true }
        proposed_by: { type: string, format: uuid, nullable: true }
        proposed_at: { type: string, format: date-time, nullable: true }
        approved_by: { type: string, format: uuid, nullable: true }
        approved_at: { type: string, format: date-time, nullable: true }
        exported_at: { type: string, format: date-time, nullable: true }
        supersedes_id: { type: string, format: uuid, nullable: true }
        supersedes_chain: { type: integer }
        valid_from: { type: string, format: date-time }
        valid_to: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, sku, channel_code, scheme, amount, currency, status, valid_from, created_at]

    PriceProposal:
      type: object
      required: [channel_code, scheme, amount, currency, valid_from]
      properties:
        channel_code: { type: string }
        scheme: { $ref: '#/components/schemas/Scheme' }
        amount: { type: number, format: double, minimum: 0 }
        currency: { type: string, minLength: 3, maxLength: 3 }
        pvp_min: { type: number, format: double, nullable: true }
        rule_applied: { type: string }
        valid_from: { type: string, format: date-time }
        valid_to: { type: string, format: date-time, nullable: true }
        comment: { type: string }

    PriceBulkApprove:
      type: object
      required: [price_ids]
      properties:
        price_ids:
          type: array
          items: { type: string, format: uuid }
          minItems: 1
          maxItems: 500
        comment: { type: string }

    WhatIfRequest:
      type: object
      properties:
        scope: { type: string, enum: [global, channel, scheme, channel_scheme, sku] }
        sku: { type: string }
        channel_code: { type: string }
        scheme: { $ref: '#/components/schemas/Scheme' }
        fx_override:
          type: object
          properties:
            from: { type: string }
            to: { type: string }
            rate: { type: number }
        cost_override:
          type: object
          properties:
            supplier_code: { type: string }
            delta_pct: { type: number }

    WhatIfResult:
      type: object
      properties:
        scenarios:
          type: array
          items:
            type: object
            properties:
              sku: { type: string }
              channel_code: { type: string }
              scheme: { $ref: '#/components/schemas/Scheme' }
              current_amount: { type: number }
              simulated_amount: { type: number }
              delta_pct: { type: number }
              would_trigger_review: { type: boolean }

    # ─── Channels / Schemes ────────────────────────────────
    Channel:
      type: object
      properties:
        code: { type: string }
        name: { type: string }
        state: { $ref: '#/components/schemas/ChannelState' }
        schemes_supported:
          type: array
          items: { $ref: '#/components/schemas/Scheme' }
        currency: { type: string, minLength: 3, maxLength: 3 }
        requires_translations:
          type: array
          items: { type: string, enum: [es, ar] }
        go_live_target: { type: string, format: date, nullable: true }
        notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [code, name, state, currency]

    SchemeDef:
      type: object
      properties:
        code: { $ref: '#/components/schemas/Scheme' }
        name: { type: string }
        description: { type: string, nullable: true }
        cost_components_template: { type: object, additionalProperties: true }
        active: { type: boolean }
      required: [code, name, active]

    # ─── Currencies / FX ───────────────────────────────────
    Currency:
      type: object
      properties:
        code: { type: string, minLength: 3, maxLength: 3 }
        name: { type: string }
        symbol: { type: string, nullable: true }
        decimals: { type: integer, minimum: 0, maximum: 8 }
        is_base: { type: boolean }
        active: { type: boolean }
      required: [code, name, decimals, is_base, active]

    FxRate:
      type: object
      properties:
        id: { type: integer, format: int64 }
        from_currency: { type: string, minLength: 3, maxLength: 3 }
        to_currency: { type: string, minLength: 3, maxLength: 3 }
        rate: { type: number, format: double }
        effective_from: { type: string, format: date-time }
        effective_to: { type: string, format: date-time, nullable: true }
        source: { $ref: '#/components/schemas/FxSource' }
        entered_by: { type: string, format: uuid, nullable: true }
        notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
      required: [id, from_currency, to_currency, rate, effective_from, source, created_at]

    FxRateCreate:
      type: object
      required: [from_currency, to_currency, rate, effective_from]
      properties:
        from_currency: { type: string, minLength: 3, maxLength: 3 }
        to_currency: { type: string, minLength: 3, maxLength: 3 }
        rate: { type: number, exclusiveMinimum: 0 }
        effective_from: { type: string, format: date-time }
        effective_to: { type: string, format: date-time, nullable: true }
        source: { $ref: '#/components/schemas/FxSource' }
        notes: { type: string }

    # ─── Exception rules ───────────────────────────────────
    ExceptionRule:
      type: object
      properties:
        code: { type: string }
        name: { type: string }
        scope: { type: string, enum: [global, per_channel, per_scheme, per_channel_scheme] }
        channel_code: { type: string, nullable: true }
        scheme: { $ref: '#/components/schemas/Scheme', nullable: true }
        params: { type: object, additionalProperties: true }
        enabled: { type: boolean }
        updated_by: { type: string, format: uuid, nullable: true }
        updated_at: { type: string, format: date-time }
      required: [code, name, scope, params, enabled]

    ExceptionRuleCreate:
      type: object
      required: [code, name, scope, params]
      properties:
        code: { type: string }
        name: { type: string }
        scope: { type: string, enum: [global, per_channel, per_scheme, per_channel_scheme] }
        channel_code: { type: string }
        scheme: { $ref: '#/components/schemas/Scheme' }
        params: { type: object, additionalProperties: true }
        enabled: { type: boolean, default: true }

    ExceptionRulePatch:
      type: object
      properties:
        name: { type: string }
        scope: { type: string, enum: [global, per_channel, per_scheme, per_channel_scheme] }
        channel_code: { type: string }
        scheme: { $ref: '#/components/schemas/Scheme' }
        params: { type: object, additionalProperties: true }
        enabled: { type: boolean }

    ApprovalAction:
      type: object
      properties:
        action: { type: string, enum: [approve, reject, revise] }
        comment: { type: string }
        suggested_amount: { type: number, format: double }

    ApprovalDigest:
      type: object
      properties:
        date: { type: string, format: date }
        auto_approved_count: { type: integer }
        pending_count: { type: integer }
        escalated_count: { type: integer }
        items:
          type: array
          items: { $ref: '#/components/schemas/Price' }

    # ─── Imports ───────────────────────────────────────────
    ImportBatch:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { $ref: '#/components/schemas/ImportType' }
        file_url: { type: string, format: uri }
        file_hash_sha256: { type: string }
        idempotency_key: { type: string }
        uploaded_by: { type: string, format: uuid, nullable: true }
        status: { $ref: '#/components/schemas/ImportStatus' }
        summary: { type: object, additionalProperties: true, nullable: true }
        error_log: { type: object, additionalProperties: true, nullable: true }
        applied_by: { type: string, format: uuid, nullable: true }
        started_at: { type: string, format: date-time }
        preview_ready_at: { type: string, format: date-time, nullable: true }
        applied_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }
      required: [id, type, file_url, file_hash_sha256, idempotency_key, status, started_at]

    ImportPreview:
      type: object
      properties:
        batch_id: { type: string, format: uuid }
        status: { $ref: '#/components/schemas/ImportStatus' }
        counts:
          type: object
          properties:
            create: { type: integer }
            update: { type: integer }
            skip_locked: { type: integer }
            no_change: { type: integer }
            error: { type: integer }
        rows:
          type: array
          items:
            type: object
            properties:
              row_index: { type: integer }
              entity_type: { type: string }
              entity_id: { type: string, nullable: true }
              action: { type: string, enum: [create, update, skip_locked, no_change, error] }
              status: { type: string, enum: [pending, applied, failed] }
              error: { type: string, nullable: true }
              data: { type: object, additionalProperties: true }
              diff: { type: object, additionalProperties: true, nullable: true }

    ImportApplyRequest:
      type: object
      properties:
        row_indices:
          type: array
          items: { type: integer }
          nullable: true
          description: "null = aplicar todo; lista = aplicar subset"
        comment: { type: string }

    # ─── Material compatibility ────────────────────────────
    MaterialCompatibility:
      type: object
      properties:
        id: { type: integer, format: int64 }
        fluid: { type: string }
        temperature_c: { type: integer, nullable: true }
        laton: { $ref: '#/components/schemas/CompatT' }
        acero_carbono: { $ref: '#/components/schemas/CompatT' }
        fundicion: { $ref: '#/components/schemas/CompatT' }
        ss304: { $ref: '#/components/schemas/CompatT' }
        ss316: { $ref: '#/components/schemas/CompatT' }
        epdm: { $ref: '#/components/schemas/CompatT' }
        nbr: { $ref: '#/components/schemas/CompatT' }
        fkm: { $ref: '#/components/schemas/CompatT' }
        ptfe: { $ref: '#/components/schemas/CompatT' }
        rptfe_fg15: { $ref: '#/components/schemas/CompatT' }
        rptfe_gr15: { $ref: '#/components/schemas/CompatT' }
        source_row: { type: integer, nullable: true }
        source_file: { type: string }
        imported_at: { type: string, format: date-time }
      required: [id, fluid, source_file, imported_at]

    # ─── Jobs ──────────────────────────────────────────────
    JobDefinition:
      type: object
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        task_name: { type: string }
        description: { type: string, nullable: true }
        owner: { $ref: '#/components/schemas/JobOwner' }
        schedule_type: { $ref: '#/components/schemas/ScheduleType' }
        cron_expression: { type: string, nullable: true }
        interval_seconds: { type: integer, nullable: true }
        timezone: { type: string, default: "Asia/Dubai" }
        queue: { type: string }
        args: { type: array, items: {} }
        kwargs: { type: object, additionalProperties: true }
        enabled: { type: boolean }
        last_run_at: { type: string, format: date-time, nullable: true }
        last_status: { $ref: '#/components/schemas/JobStatus', nullable: true }
        last_error: { type: string, nullable: true }
        last_celery_task_id: { type: string, nullable: true }
        edited_by: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, code, task_name, owner, schedule_type, timezone, queue, enabled]

    JobDefinitionCreate:
      type: object
      required: [code, task_name, schedule_type, timezone, queue]
      properties:
        code: { type: string }
        task_name: { type: string }
        description: { type: string }
        owner: { $ref: '#/components/schemas/JobOwner' }
        schedule_type: { $ref: '#/components/schemas/ScheduleType' }
        cron_expression: { type: string }
        interval_seconds: { type: integer, minimum: 1 }
        timezone: { type: string }
        queue: { type: string }
        args: { type: array, items: {} }
        kwargs: { type: object, additionalProperties: true }
        enabled: { type: boolean, default: true }

    JobDefinitionPatch:
      type: object
      properties:
        description: { type: string }
        cron_expression: { type: string }
        interval_seconds: { type: integer }
        timezone: { type: string }
        queue: { type: string }
        args: { type: array, items: {} }
        kwargs: { type: object, additionalProperties: true }
        enabled: { type: boolean }

    JobRun:
      type: object
      properties:
        run_id: { type: string, format: uuid }
        job_code: { type: string }
        status: { $ref: '#/components/schemas/JobStatus' }
        started_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }
        retries: { type: integer }
        celery_task_id: { type: string, nullable: true }
        result: { type: object, additionalProperties: true, nullable: true }
        error: { type: string, nullable: true }
      required: [run_id, job_code, status]

    # ─── Audit ─────────────────────────────────────────────
    AuditEvent:
      type: object
      properties:
        id: { type: integer, format: int64 }
        occurred_at: { type: string, format: date-time }
        actor_id: { type: string, format: uuid, nullable: true }
        actor_email: { type: string, format: email, nullable: true }
        actor_role: { type: string, nullable: true }
        entity_type: { type: string }
        entity_id: { type: string }
        action: { type: string }
        before: { type: object, additionalProperties: true, nullable: true }
        after: { type: object, additionalProperties: true, nullable: true }
        diff: { type: object, additionalProperties: true, nullable: true }
        reason: { type: string, nullable: true }
        rules_evaluated: { type: object, additionalProperties: true, nullable: true }
        request_id: { type: string, format: uuid, nullable: true }
        ip: { type: string, nullable: true }
        user_agent: { type: string, nullable: true }
      required: [id, occurred_at, entity_type, entity_id, action]

    AuditEventPage:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/AuditEvent' } }
        next_cursor: { type: string, nullable: true }

    # ─── KB ────────────────────────────────────────────────
    KbSource:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { type: string, enum: [datasheet, standard, manual, catalog] }
        code: { type: string, nullable: true }
        title: { type: string }
        storage_path: { type: string }
        language: { type: string }
        version: { type: string, nullable: true }
        sku_links: { type: array, items: { type: string } }
        indexed: { type: boolean, description: "Fase 1: false; Fase 1.5+: true cuando se indexe" }
        created_at: { type: string, format: date-time }
      required: [id, type, title, storage_path, language, indexed]

    KbSourceCreate:
      type: object
      required: [type, title, storage_path, language]
      properties:
        type: { type: string, enum: [datasheet, standard, manual, catalog] }
        code: { type: string }
        title: { type: string }
        storage_path: { type: string }
        language: { type: string }
        version: { type: string }
        sku_links: { type: array, items: { type: string } }

    KbChunk:
      type: object
      properties:
        id: { type: string, format: uuid }
        source_id: { type: string, format: uuid }
        chunk_index: { type: integer }
        text: { type: string }
        page: { type: integer, nullable: true }
        metadata: { type: object, additionalProperties: true }
        embedding_model: { type: string, nullable: true }
        embedding_at: { type: string, format: date-time, nullable: true }
      required: [id, source_id, chunk_index, text]

    KbSearchResult:
      type: object
      properties:
        chunk: { $ref: '#/components/schemas/KbChunk' }
        source: { $ref: '#/components/schemas/KbSource' }
        score: { type: number }

    # ─── Comparator ────────────────────────────────────────
    MatchCandidate:
      type: object
      properties:
        id: { type: string, format: uuid }
        sku: { type: string }
        listing_id: { type: string, format: uuid }
        score_image: { type: number, nullable: true }
        score_text: { type: number, nullable: true }
        score_specs: { type: number, nullable: true }
        score_combined: { type: number }
        threshold_band: { type: string, enum: [auto_match, human_queue, discard] }
      required: [id, sku, listing_id, score_combined, threshold_band]

    MatchDecision:
      type: object
      properties:
        id: { type: string, format: uuid }
        sku: { type: string }
        listing_id: { type: string, format: uuid }
        verdict: { type: string, enum: [match, no_match, uncertain] }
        decided_by: { type: string, enum: [auto, human, judge] }
        decided_by_user_id: { type: string, format: uuid, nullable: true }
        score_combined: { type: number, nullable: true }
        judge_rationale: { type: string, nullable: true }
        judge_image_regions: { type: array, items: { type: object }, nullable: true }
        deal_breakers_triggered: { type: array, items: { type: string } }
        decided_at: { type: string, format: date-time }
      required: [id, sku, listing_id, verdict, decided_by, decided_at]

    # ─── Health ────────────────────────────────────────────
    HealthCheck:
      type: object
      properties:
        status: { type: string, enum: [ok, degraded, fail] }
        checks:
          type: object
          additionalProperties:
            type: object
            properties:
              status: { type: string, enum: [ok, degraded, fail] }
              latency_ms: { type: number }
              detail: { type: string }
        version: { type: string }
        commit: { type: string }
        timestamp: { type: string, format: date-time }
      required: [status, timestamp]

    ErrorResponse:
      $ref: '#/components/schemas/ProblemDetails'
